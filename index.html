<!DOCTYPE html>
<html>
<head>
  <title>Lan's Organic Garden</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .logo {
      width: 50px;
      height: 50px;
      background: lightgray;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    /* MAIN */
    .container {
      padding: 20px;
    }

    .grid {
      display: flex;
      gap: 20px;
    }

    .card {
      width: 150px;
      height: 150px;
      background: lightgray;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 10px;
      border-radius: 10px;
      font-weight: bold;
    }

    /* FOOTER */
    .footer {
      margin-top: 40px;
      padding: 20px;
      background: white;
      border-top: 1px solid #ddd;
      text-align: center;
    }

    .contact {
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Logo</div>
    <div class="title">Lan's Organic Garden</div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    <h2>Fruit Listings</h2>

    <div class="grid">
      <div class="card">Apple - $1.50</div>
      <div class="card">Banana - $0.90</div>
      <div class="card">Orange - $1.20</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="contact">Email: example@email.com</div>
    <div class="contact">Phone: (123) 456-7890</div>
    <div class="contact">Location: Pomona, CA</div>
  </div>

</body>
</html>
