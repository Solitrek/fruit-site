<!DOCTYPE html>
<html>
<head>
  <title>Lan's Organic Garden</title>
  <link href="https://fonts.googleapis.com/css2?family=Momo+Signature&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 8px;
      background: #eee;
      flex-shrink: 0;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      width: 300px;
      height: 300px;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.16);
    }

    .card-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .footer {
      margin-top: 40px;
      padding: 20px;
      background: white;
      border-top: 1px solid #ddd;
      text-align: center;
    }

    .contact {
      margin: 5px 0;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 700px;
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      cursor: pointer;
      border: none;
      background: none;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      margin-top: 15px;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="header">
    <img class="logo" id="logoImg" src="https://via.placeholder.com/120x120.png?text=Logo" alt="Logo">
    <div class="title">Lan's Organic Garden</div>
  </div>

  <div class="container">
    <h2>Fruit Listings</h2>

    <div class="grid">
      <div
        class="card"
        style="background-image: url('https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?auto=format&fit=crop&w=1200&q=80');"
        onclick="openModal('Apple', '$1.50', 'https://www.youtube.com/embed/dQw4w9WgXcQ')"
      >
        <div class="card-overlay">
          <span>Apple</span>
          <span>$1.50</span>
        </div>
      </div>

      <div
        class="card"
        style="background-image: url('https://commons.wikimedia.org/wiki/Special:FilePath/Banana-Single.jpg');"
        onclick="openModal('Banana', '$0.90', 'https://www.youtube.com/embed/ysz5S6PUM-U')"
      >
        <div class="card-overlay">
          <span>Banana</span>
          <span>$0.90</span>
        </div>
      </div>

      <div
        class="card"
        style="background-image: url('https://images.unsplash.com/photo-1547514701-42782101795e?auto=format&fit=crop&w=1200&q=80');"
        onclick="openModal('Orange', '$1.20', 'https://www.youtube.com/embed/tgbNymZ7vqY')"
      >
        <div class="card-overlay">
          <span>Orange</span>
          <span>$1.20</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="contact">Email: xhn_1024@hotmail.com</div>
    <div class="contact">Phone: (323) 313-7791</div>
    <div class="contact">Location: Pomona, CA</div>
  </div>

  <div class="modal" id="fruitModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <h2 id="fruitName"></h2>
      <p id="fruitPrice"></p>

      <div class="video-wrap">
        <iframe
          id="fruitVideo"
          src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

  <script>
    // PASTE A DIRECT IMAGE LINK HERE
    const logoURL = "https://i.ibb.co/Z1kXD59k/64e880a7-5b25-47bd-b224-2a13ac539b49.png";

    document.getElementById("logoImg").src = logoURL;

    function openModal(name, price, videoUrl) {
      document.getElementById("fruitName").textContent = name;
      document.getElementById("fruitPrice").textContent = price;
      document.getElementById("fruitVideo").src = videoUrl;
      document.getElementById("fruitModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("fruitModal").style.display = "none";
      document.getElementById("fruitVideo").src = "";
    }

    window.onclick = function(event) {
      const modal = document.getElementById("fruitModal");
      if (event.target === modal) {
        closeModal();
      }
    };
  </script>

</body>
</html>
